<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="app-shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Subtrack</div>
      <div class="logo-sub">Your Sub Sidekick</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="index.html" class="nav-item active">
        <i class="ti ti-layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="pages/analytics.html" class="nav-item">
        <i class="ti ti-chart-bar"></i>
        <span>Funny Numbers</span>
      </a>
      <a href="pages/subscriptions.html" class="nav-item">
        <i class="ti ti-list"></i>
        <span>My Subs</span>
      </a>
      
      
    </div>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar"></div>
        <div class="user-info">
          <div class="user-name"></div>
          <div class="user-role">Free plan</div>
        </div>
        <!-- Logout button — wired up by session.js -->
        <i class="ti ti-logout settings-icon" id="logoutBtn" role="button" tabindex="0" title="Logout" aria-label="Log out"></i>
      </div>
    </div>
  </div>
  <!-- Logout button moved outside user-pill -->
  <div style="padding: 10px 16px; border-top: 1px solid #eee; margin-top: 8px;">
    <a href="#" id="logoutBtn" style="display: flex; align-items: center; gap: 10px; color: #dc3545; text-decoration: none; padding: 8px 12px; border-radius: 6px; background: #f8f9fa;">
      <i class="ti ti-logout"></i>
      <span>Logout</span>
    </a>
  </div>
</div>
    
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-area">

    <header class="topbar">
      <h1 class="page-title">Dashboard</h1>
      <div class="topbar-actions">
        <div class="view-toggle">
          <button class="vbtn active" data-view="list" title="List view" aria-label="List view"><i class="ti ti-list"></i></button>
          <button class="vbtn" data-view="grid" title="Grid view" aria-label="Grid view"><i class="ti ti-layout-grid"></i></button>
        </div>
        <button class="btn-add" id="openModalBtn">
          <i class="ti ti-plus"></i>
          Add a Sub
        </button>
      </div>
    </header>

    <div class="content">

      <!-- Stat cards -->
      <div class="summary-row">
        <div class="stat-card">
          <div class="stat-label">Monthly Damage</div>
          <div class="stat-value" id="totalMonthly">RM 0</div>
          <div class="stat-sub">keeping <span id="activeCount">0</span> subs alive</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="activeSubCount">0</div>
          <div class="stat-sub">and counting</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Renewing Soon</div>
          <div class="stat-value" id="renewingSoonCount" style="color: var(--attention);">0</div>
          <div class="stat-sub">in the next week</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cancelled</div>
          <div class="stat-value" id="cancelledCount">0</div>
          <div class="stat-sub">shown the door</div>
        </div>
      </div>

      <!-- Filter tabs + table -->
      <div class="section-header">
        <div class="section-title">The Full Lineup</div>
        <div class="filter-tabs" id="filterTabs">
          <button type="button" class="tab active" data-filter="all">All</button>
          <button type="button" class="tab" data-filter="active">Active</button>
          <button type="button" class="tab" data-filter="cancelled">Cancelled</button>
        </div>
      </div>

      <!-- Table rendered dynamically -->
      <div id="subscriptionsTable"></div>

    </div>
  </main>
</div>

<!-- ===== ADD / EDIT MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add a Sub</div>
      <button class="close-btn" id="closeModalBtn" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>

    <form id="subscriptionForm">
      <input type="hidden" id="editId" value="" />

      <div class="form-field">
        <label class="field-label" for="sub-name">Service name</label>
        <input class="field-input" id="sub-name" type="text" placeholder="e.g. Netflix, Spotify..." required />
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-cat">Category</label>
        <select class="field-input" id="sub-cat" required>
          <option value="" disabled selected>Select a category</option>
          <option>Streaming</option>
          <option>Music</option>
          <option>Storage</option>
          <option>Design</option>
          <option>Productivity</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field-row">
        <div class="form-field">
          <label class="field-label" for="sub-cost">Monthly cost (RM)</label>
          <input class="field-input" id="sub-cost" type="number" step="0.01" placeholder="0.00" required />
        </div>
        <div class="form-field">
          <label class="field-label" for="sub-date">Renewal date</label>
          <input class="field-input" id="sub-date" type="date" required />
        </div>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-status">Status</label>
        <select class="field-input" id="sub-status">
          <option value="active">Active</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-notes">Notes (optional)</label>
        <input class="field-input" id="sub-notes" type="text" placeholder="Any notes..." />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Add It</button>
      </div>
    </form>
  </div>
</div>

<!-- session.js runs first: guards the page and sets user display -->
<script src="js/session.js"></script>
<script src="js/animate-value.js"></script>
<!-- simple_CRUD.js handles all subscription logic and modal state -->
<script src="js/simple_CRUD.js"></script>

</body>
</html>
