<!DOCTYPE html>
<!-- Hidden until session.js confirms an authenticated session, so an unauthenticated visitor
     is redirected to login.html before ever seeing the dashboard render. -->
<html lang="en" style="visibility:hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Dashboard</title>
  <!-- Safety net: if session.js fails to run at all (e.g. module scripts blocked when opened via
       file:// instead of a server), don't leave the page permanently blank. -->
  <script>setTimeout(function () { document.documentElement.style.visibility = 'visible'; }, 1500)</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/modal.css" />
</head>
<body>

<div class="app-shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Subtrack</div>
      <div class="logo-sub">Subscription Tracker</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="index.html" class="nav-item active">
        <i class="ti ti-layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="pages/analytics.html" class="nav-item">
        <i class="ti ti-chart-bar"></i>
        <span>Analytics</span>
      </a>
      <a href="pages/subscriptions.html" class="nav-item">
        <i class="ti ti-list"></i>
        <span>My Subs</span>
      </a>
      
      
    </div>

    <div class="sidebar-footer">
      <!-- Click to reveal the logout action — wired up by session.js -->
      <button class="user-pill" id="userPill" type="button" aria-expanded="false" aria-controls="logoutReveal">
        <span class="avatar"><i class="ti ti-user"></i></span>
        <span class="user-info">
          <span class="user-name"></span>
        </span>
        <i class="ti ti-chevron-up user-chevron"></i>
      </button>
      <div class="logout-reveal" id="logoutReveal">
        <div class="logout-reveal-inner">
          <button class="logout-btn" id="logoutBtn" type="button">
            <i class="ti ti-logout"></i>
            <span>Log out</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-area">

    <header class="topbar">
      <h1 class="page-title">Dashboard</h1>
    </header>

    <div class="content">

      <!-- Stat cards -->
      <div class="summary-row">
        <div class="stat-card stat-card--primary">
          <div class="stat-label">Monthly Spend</div>
          <div class="stat-value" id="totalMonthly">RM 0</div>
          <div class="stat-sub">across <span id="activeCount">0</span> active subscriptions</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="activeSubCount">0</div>
          <div class="stat-sub">currently subscribed</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Renewing Soon</div>
          <div class="stat-value" id="renewingSoonCount" style="color: var(--attention);">0</div>
          <div class="stat-sub">in the next 7 days</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cancelled</div>
          <div class="stat-value" id="cancelledCount">0</div>
          <div class="stat-sub">no longer billing</div>
        </div>
      </div>

      <!-- Main dashboard grid: costliest subscriptions + spend breakdown side panels -->
      <div class="dashboard-grid">

        <section class="dashboard-main">
          <div class="section-header">
            <div class="section-title">Top 5 Most Expensive</div>
          </div>
          <!-- Table rendered dynamically (top-5 view) -->
          <div id="subscriptionsTable" data-view="top5"></div>
        </section>

        <aside class="dashboard-side">
          <div class="analytics-panel">
            <div class="analytics-panel-title">Spend by Category</div>
            <div id="categoryDonut" class="donut-wrap"></div>
          </div>
          <div class="analytics-panel">
            <div class="analytics-panel-title">Renewing Soon</div>
            <div id="upcomingList"></div>
          </div>
        </aside>

      </div>

    </div>
  </main>
</div>

<!-- ===== ADD / EDIT MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Subscription</div>
      <button class="close-btn" id="closeModalBtn" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>

    <form id="subscriptionForm">
      <input type="hidden" id="editId" value="" />

      <div class="form-field">
        <label class="field-label" for="sub-name">Service name</label>
        <input class="field-input" id="sub-name" type="text" placeholder="e.g. Netflix, Spotify..." required maxlength="60" />
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-cat">Category</label>
        <select class="field-input" id="sub-cat" required>
          <option value="" disabled selected>Select a category</option>
          <option>Streaming</option>
          <option>Music</option>
          <option>Storage</option>
          <option>Design</option>
          <option>Productivity</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field-row">
        <div class="form-field">
          <label class="field-label" for="sub-cost">Monthly cost (RM)</label>
          <input class="field-input" id="sub-cost" type="number" step="0.01" min="0.01" max="999999.99" placeholder="0.00" required />
        </div>
        <div class="form-field">
          <label class="field-label" for="sub-date">Renewal date</label>
          <input class="field-input" id="sub-date" type="date" required />
        </div>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-status">Status</label>
        <select class="field-input" id="sub-status">
          <option value="active">Active</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-notes">Notes (optional)</label>
        <input class="field-input" id="sub-notes" type="text" placeholder="Any notes..." maxlength="200" />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Add Subscription</button>
      </div>
    </form>
  </div>
</div>

<!-- Load order matters: config -> supabase client -> session guard -> everything else -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/session.js"></script>
<script src="js/animate-value.js"></script>
<script src="js/shared-data.js"></script>
<script src="node_modules/animejs/dist/bundles/anime.umd.min.js"></script>
<!-- dashboard.js defines renderDashboardExtras (donut + renewals) used by simple_CRUD's render -->
<script src="js/dashboard.js"></script>
<!-- simple_CRUD.js handles all subscription logic and modal state -->
<script src="js/simple_CRUD.js"></script>

</body>
</html>
