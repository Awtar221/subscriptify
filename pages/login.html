<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="app-shell">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="../logo.jpeg" alt="Subtrack logo" />
    </div>

    <div class="auth-title">Welcome back!</div>
    <div class="auth-sub">Your subs missed you</div>

    <!-- Error message area -->
    <div id="error-message" class="auth-banner error" role="alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="loginUsername">Email</label>
        <input type="email" id="loginUsername" placeholder="your@email.com" required autocomplete="email" maxlength="254" />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password" maxlength="128" />
          <i class="ti ti-eye toggle-password" id="togglePassword" role="button" tabindex="0" aria-label="Show password"></i>
        </div>
      </div>

      <label class="remember-me">
        <input type="checkbox" id="rememberMe" checked />
        Remember me
      </label>

    <button class="btn-auth" id="loginBtn" type="submit">
      <span class="btn-text" id="loginText">Let's Go</span>
      <span class="spinner-container" id="loginSpinner"><span class="loading-spinner"></span></span>
    </button>

    <div class="auth-footer">
      New here? <a href="register.html">Join the club</a>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<!-- Use login.js for login -->
<script type="module" src="../js/login.js"></script>

</body>
</html>
