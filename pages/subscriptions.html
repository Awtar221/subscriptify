<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – My Subscriptions</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/modal.css" />
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Subtrack</div>
      <div class="logo-sub">Subscription Tracker</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="../index.html" class="nav-item">
        <i class="ti ti-layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="subscriptions.html" class="nav-item active">
        <i class="ti ti-list"></i>
        <span>My Subscriptions</span>
      </a>
      <a href="analytics.html" class="nav-item">
        <i class="ti ti-chart-bar"></i>
        <span>Analytics</span>
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar"></div>
        <div class="user-info">
          <div class="user-name"></div>
          <div class="user-role">Free plan</div>
        </div>
        <i class="ti ti-logout settings-icon" id="logoutBtn" title="Logout"></i>
      </div>
    </div>
  </aside>

  <main class="main-area">

    <header class="topbar">
      <h1 class="page-title">My Subscriptions</h1>
      <div class="topbar-actions">
        <button class="btn-add" id="openModalBtn">
          <i class="ti ti-plus"></i>
          Add Subscription
        </button>

        <div class="menu-dropdown">
          <button class="icon-btn" id="menuBtn" style="width:36px;height:36px;background:var(--mc-700);border:1px solid var(--mc-500);border-radius:var(--radius-md);" title="More options">
            <i class="ti ti-dots-vertical"></i>
          </button>

          <div class="dropdown-panel" id="dropdownPanel">
            <a href="#" class="dropdown-item" id="exportDataBtn">
              <i class="ti ti-download"></i>
              <span>Export Data</span>
            </a>
            <a href="#" class="dropdown-item" id="importDataBtn">
              <i class="ti ti-upload"></i>
              <span>Import Data</span>
            </a>
            <hr class="dropdown-divider" />
            <a href="#" class="dropdown-item danger" id="clearAllBtn">
              <i class="ti ti-trash"></i>
              <span>Clear All Data</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <div class="content">
<div class="section-header" style="display: flex; align-items: center; justify-content: flex-start; gap: 20px;">
    

<div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="active">Active</button>
    <button class="tab" data-filter="cancelled">Cancelled</button>
    <button class="tab" data-filter="renewing-soon">Renewing Soon</button>
</div>

</div>

      <div id="subscriptionsTable"></div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Subscription</div>
      <button class="close-btn" id="closeModalBtn"><i class="ti ti-x"></i></button>
    </div>

    <form id="subscriptionForm">
      <input type="hidden" id="editId" value="" />

      <div class="form-field">
        <label class="field-label" for="sub-name">Service name</label>
        <input class="field-input" id="sub-name" type="text" placeholder="e.g. Netflix, Spotify..." required />
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-cat">Category</label>
        <select class="field-input" id="sub-cat" required>
          <option value="" disabled selected>Select a category</option>
          <option>Streaming</option>
          <option>Music</option>
          <option>Storage</option>
          <option>Design</option>
          <option>Productivity</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field-row">
        <div class="form-field">
          <label class="field-label" for="sub-cost">Monthly cost (RM)</label>
          <input class="field-input" id="sub-cost" type="number" step="0.01" placeholder="0.00" required />
        </div>
        <div class="form-field">
          <label class="field-label" for="sub-date">Renewal date</label>
          <input class="field-input" id="sub-date" type="date" required />
        </div>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-status">Status</label>
        <select class="field-input" id="sub-status">
          <option value="active">Active</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-notes">Notes (optional)</label>
        <input class="field-input" id="sub-notes" type="text" placeholder="Any notes..." />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Add Subscription</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/session.js"></script>
<script src="../js/simple_CRUD.js"></script>
<script src="../js/dropdown.js"></script>

</body>
</html>
