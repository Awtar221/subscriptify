<!DOCTYPE html>
<!-- Hidden until session.js confirms an authenticated session — see index.html for why. -->
<html lang="en" style="visibility:hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – My Subscriptions</title>
  <!-- Set theme before first paint so there's no flash of the wrong theme. -->
  <script>(function(){var t=localStorage.getItem('subtrack_theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <!-- Safety net: if session.js fails to run at all (e.g. module scripts blocked when opened via
       file:// instead of a server), don't leave the page permanently blank. -->
  <script>setTimeout(function () { document.documentElement.style.visibility = 'visible'; }, 1500)</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/modal.css" />
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Subtrack</div>
      <div class="logo-sub">Subscription Tracker</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="../index.html" class="nav-item">
        <i class="ti ti-layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="analytics.html" class="nav-item">
        <i class="ti ti-chart-bar"></i>
        <span>Analytics</span>
      </a>
      <a href="subscriptions.html" class="nav-item active">
        <i class="ti ti-list"></i>
        <span>My Subs</span>
      </a>
      
    </div>

    <div class="sidebar-footer">
      <!-- Click to reveal the logout action — wired up by session.js -->
      <button class="user-pill" id="userPill" type="button" aria-expanded="false" aria-controls="logoutReveal">
        <span class="avatar"><i class="ti ti-user"></i></span>
        <span class="user-info">
          <span class="user-name"></span>
        </span>
        <i class="ti ti-chevron-up user-chevron"></i>
      </button>
      <div class="logout-reveal" id="logoutReveal">
        <div class="logout-reveal-inner">
          <button class="logout-btn" id="logoutBtn" type="button">
            <i class="ti ti-logout"></i>
            <span>Log out</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-area">

    <header class="topbar">
      <h1 class="page-title">My Subscriptions</h1>
      <div class="topbar-actions">
        <button class="icon-btn theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i class="ti ti-moon"></i>
        </button>
        <button class="btn-add" id="openModalBtn">
          <i class="ti ti-plus"></i>
          Add Subscription
        </button>

        <div class="menu-dropdown">
          <button class="icon-btn" id="menuBtn" style="width:36px;height:36px;background:var(--mc-700);border:1px solid var(--mc-500);border-radius:var(--radius-md);" title="More options" aria-label="More options" aria-haspopup="true" aria-expanded="false">
            <i class="ti ti-dots-vertical"></i>
          </button>

          <!-- Dropdown panel — toggled by dropdown.js -->
          <div class="dropdown-panel" id="dropdownPanel" role="menu">
            <a href="#" class="dropdown-item" id="exportDataBtn">
              <i class="ti ti-download"></i>
              <span>Export Data</span>
            </a>
            <a href="#" class="dropdown-item" id="importDataBtn">
              <i class="ti ti-upload"></i>
              <span>Import Data</span>
            </a>
            <hr class="dropdown-divider" />
            <a href="#" class="dropdown-item danger" id="clearAllBtn">
              <i class="ti ti-trash"></i>
              <span>Clear All Data</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <div class="content">
      <div class="section-header">
        <div class="section-title">All Subscriptions</div>
        <div class="filter-tabs" id="filterTabs">
          <button type="button" class="tab active" data-filter="all">All</button>
          <button type="button" class="tab" data-filter="active">Active</button>
          <button type="button" class="tab" data-filter="cancelled">Cancelled</button>
          <button type="button" class="tab" data-filter="renewing-soon">Renewing Soon</button>
        </div>
        <div class="search-box">
          <i class="ti ti-search"></i>
          <input type="text" id="searchInput" placeholder="Search subscriptions..." />
        </div>
      </div>

      <div id="subscriptionsTable"></div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Subscription</div>
      <button class="close-btn" id="closeModalBtn" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>

    <form id="subscriptionForm">
      <input type="hidden" id="editId" value="" />

      <div class="form-field">
        <label class="field-label" for="sub-name">Service name</label>
        <input class="field-input" id="sub-name" type="text" placeholder="e.g. Netflix, Spotify..." required maxlength="60" />
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-cat">Category</label>
        <select class="field-input" id="sub-cat" required>
          <option value="" disabled selected>Select a category</option>
          <option>Streaming</option>
          <option>Music</option>
          <option>Storage</option>
          <option>Design</option>
          <option>Productivity</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field-row">
        <div class="form-field">
          <label class="field-label" for="sub-cost">Monthly cost (RM)</label>
          <input class="field-input" id="sub-cost" type="number" step="0.01" min="0.01" max="999999.99" placeholder="0.00" required />
        </div>
        <div class="form-field">
          <label class="field-label" for="sub-date">Renewal date</label>
          <input class="field-input" id="sub-date" type="date" required />
        </div>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-status">Status</label>
        <select class="field-input" id="sub-status">
          <option value="active">Active</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="form-field">
        <label class="field-label" for="sub-notes">Notes (optional)</label>
        <input class="field-input" id="sub-notes" type="text" placeholder="Any notes..." maxlength="200" />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="saveBtn">Add Subscription</button>
      </div>
    </form>
  </div>
</div>

<!-- Load order matters:
     1. session.js   — redirect if not logged in, show user info
     2. simple_CRUD.js — subscription logic
     3. dropdown.js  — three-dot menu (needs subscriptionManager from step 2)  -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/session.js"></script>
<script src="../js/shared-data.js"></script>
<script src="../node_modules/animejs/dist/bundles/anime.umd.min.js"></script>
<script src="../js/simple_CRUD.js"></script>
<script src="../js/dropdown.js"></script>
<script src="../js/theme.js"></script>


</body>
</html>
