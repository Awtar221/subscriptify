<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscriptify – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="app-shell">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="logo.jpeg" alt="Subscriptify logo" />
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your account</div>

    <!-- Error message area -->
    <div id="error-message" style="display:none; background:#ff4444; color:white; padding:10px; border-radius:6px; margin-bottom:15px; text-align:center;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="loginUsername">Email</label>
        <input type="email" id="loginUsername" placeholder="your@email.com" required />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn-auth" id="loginBtn">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>
</div>

<!-- Use login.js for login -->
<script type="module" src="js/login.js"></script>

</body>
</html>
