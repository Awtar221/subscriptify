<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtrack – Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="app-shell">
  <div class="auth-card">
    <div class="auth-title">Create account</div>
    <div class="auth-sub">Start tracking your subscriptions</div>

    <!-- Error message area -->
    <div id="error-message" style="display:none; background:#ff4444; color:white; padding:10px; border-radius:6px; margin-bottom:15px; text-align:center;"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="regUsername">Email</label>
        <input type="email" id="regUsername" placeholder="your@email.com" required />
      </div>

      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="regConfirm">Confirm password</label>
        <input type="password" id="regConfirm" placeholder="Confirm your password" required />
      </div>

      <button type="submit" class="btn-auth" id="registerBtn">Register</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<!-- Use register.js for registration -->
<script type="module" src="js/register.js"></script>

</body>
</html>
